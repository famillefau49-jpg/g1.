<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmission du Lynx</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background:black;
    color:#00ff9c;
    font-family:"Courier New", monospace;
    text-align:center;
    padding:20px;
}

.container {
    max-width:500px;
    margin:auto;
    border:2px solid #00ff9c;
    padding:20px;
    border-radius:10px;
}

button {
    display:block;
    margin:10px auto;
    padding:12px;
    width:90%;
    background:black;
    color:#00ff9c;
    border:1px solid #00ff9c;
    font-size:16px;
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h2>📡 Transmission du Lynx</h2>
<div id="question">Connexion...</div>
</div>

<script>

let step = 0;

const questions = [

{
q: "Quel symbole est associé à la Résistance française ?",
a: ["Le drapeau blanc", "La croix de Lorraine", "Une étoile"],
correct: 1
},

{
q: "Ce symbole possède combien de barres horizontales ?",
a: ["1", "2", "3"],
correct: 1
},

{
q: "Ce symbole est utilisé pendant quelle guerre ?",
a: ["Première Guerre mondiale", "Seconde Guerre mondiale", "Guerre froide"],
correct: 1
},

{
q: "Qui incarne la France libre ?",
a: ["Napoléon", "De Gaulle", "Louis XVI"],
correct: 1
},

{
q: "Ce symbole s’oppose à quoi ?",
a: ["Occupation allemande", "République", "Église"],
correct: 0
},

{
q: "Comment s'appelle ce symbole ?",
a: ["Croix latine", "Croix de Lorraine", "Croix grecque"],
correct: 1
},

{
q: "La Résistance commence officiellement en quelle année ?",
a: ["1939", "1940", "1945"],
correct: 1
},

{
q: "Quelle information est la plus importante ?",
a: ["Le symbole", "La date", "Le lieu"],
correct: 2
}

];

function showQuestion() {

    let q = questions[step];

    document.getElementById("question").innerHTML =
    "<p class='glitch'>Décodage...</p>";

    setTimeout(() => {

        let html = "<p>" + q.q + "</p>";

        q.a.forEach((rep, i) => {
            html += "<button onclick='check(" + i + ")'>" + rep + "</button>";
        });

        document.getElementById("question").innerHTML = html;

    }, 600);
}

function check(i) {

    if(i === questions[step].correct) {

        step++;

        if(step >= questions.length) {

            confetti({
                particleCount: 150,
                spread: 90
            });

            typeMessage(
            "✔ Transmission validée...\n\n" +
            "Le message du Lynx est confirmé.\n\n" +
            "➡ Fouillez sous le hangar\n" +
            "➡ Trouvez la boîte\n\n" +
            "Fin de transmission."
            );

        } else {

            document.getElementById("question").innerHTML =
            "<p class='glitch'>Signal validé...</p>";

            setTimeout(showQuestion, 500);
        }

    } else {
        alert("⛔ Mauvaise réponse");
    }
}

function typeMessage(text) {
    let i = 0;
    let container = document.getElementById("question");
    container.innerHTML = "";

    function type() {
        if (i < text.length) {
            container.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
            i++;
            setTimeout(type, 25);
        }
    }

    type();
}

setTimeout(showQuestion, 800);

</script>

</body>
</html>
